<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Contact Registration</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --surface: #ffffff;
    --surface2: #faf8f5;
    --border: #e8e0d8;
    --border-focus: #4f7cff;
    --text: #1a1714;
    --text-secondary: #6b6460;
    --text-muted: #a89f9a;
    --accent-blue: #4f7cff;
    --accent-green: #00c48c;
    --accent-amber: #f5a623;
    --accent-red: #ff4d6a;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
    --shadow-lg: 0 16px 48px rgba(0,0,0,0.1), 0 4px 12px rgba(0,0,0,0.06);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-xs: 7px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Layered background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 900px 600px at 10% 10%, rgba(79,124,255,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 700px 500px at 90% 80%, rgba(0,196,140,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 500px 400px at 50% 50%, rgba(245,166,35,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle dot grid */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  /* Floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
    animation: orbFloat ease-in-out infinite;
  }
  .orb-1 {
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(79,124,255,0.14), transparent 70%);
    top: -100px; left: -100px;
    animation-duration: 12s; animation-delay: 0s;
  }
  .orb-2 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(0,196,140,0.12), transparent 70%);
    bottom: -80px; right: -80px;
    animation-duration: 15s; animation-delay: -5s;
  }
  .orb-3 {
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(245,166,35,0.1), transparent 70%);
    top: 40%; left: 60%;
    animation-duration: 10s; animation-delay: -8s;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(25px, -25px) scale(1.04); }
    66% { transform: translate(-18px, 18px) scale(0.97); }
  }

  /* Main wrapper */
  .wrapper {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 480px;
  }

  /* Progress bar at top */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 1.5rem;
    overflow: hidden;
    opacity: 0;
    animation: fadeIn 0.6s 0.3s forwards;
  }
  .progress-fill {
    height: 100%;
    width: 20%;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 30px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6));
    animation: shimmer 2s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; }
  }

  /* Card */
  .card {
    background: var(--surface);
    border-radius: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    opacity: 0;
    transform: translateY(28px) scale(0.98);
    animation: cardReveal 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
  }

  @keyframes cardReveal {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Rainbow top stripe */
  .stripe {
    height: 3px;
    background: linear-gradient(90deg, #4f7cff 0%, #00c48c 33%, #f5a623 66%, #ff4d6a 100%);
    background-size: 200% 100%;
    animation: stripeMove 5s ease infinite;
  }
  @keyframes stripeMove {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .card-body { padding: 2.2rem 2.2rem 1.8rem; }

  /* Header */
  .header {
    margin-bottom: 2rem;
    opacity: 0;
    animation: slideDown 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.4s forwards;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.7rem;
  }

  .icon-box {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #4f7cff 0%, #00c48c 100%);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 20px rgba(79,124,255,0.3);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .icon-box::before {
    content: '';
    position: absolute;
    top: -40%; left: -40%;
    width: 180%; height: 180%;
    background: conic-gradient(from 0deg, transparent 60%, rgba(255,255,255,0.25) 70%, transparent 80%);
    animation: rotateSweep 4s linear infinite;
  }
  @keyframes rotateSweep {
    to { transform: rotate(360deg); }
  }
  .icon-box svg { width: 26px; height: 26px; color: white; position: relative; z-index: 1; }

  .header-text h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.03em;
    line-height: 1.2;
  }
  .header-text h1 .highlight {
    background: linear-gradient(135deg, #4f7cff, #00c48c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-text p {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 0.2rem;
    font-weight: 400;
  }

  /* Step indicator */
  .steps-row {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    margin-top: 1rem;
  }
  .step-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    flex: 1;
  }
  .step-item:last-child { flex: 0; }
  .step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text-muted);
    transition: all 0.4s ease;
    flex-shrink: 0;
  }
  .step-num.active {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: white;
    box-shadow: 0 0 0 3px rgba(79,124,255,0.18);
  }
  .step-num.done {
    background: var(--accent-green);
    border-color: var(--accent-green);
    color: white;
  }
  .step-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 500;
    white-space: nowrap;
  }
  .step-label.active { color: var(--accent-blue); }
  .step-line {
    flex: 1;
    height: 1.5px;
    background: var(--border);
    border-radius: 99px;
    margin: 0 0.2rem;
    transition: background 0.4s ease;
  }
  .step-line.done { background: var(--accent-green); }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 1.4rem 0 1.2rem;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider-badge {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.3rem 0.75rem;
    background: rgba(255,77,106,0.07);
    border: 1px solid rgba(255,77,106,0.18);
    border-radius: 99px;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--accent-red);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .divider-badge svg { width: 10px; height: 10px; }

  /* Form */
  .form-fields { display: flex; flex-direction: column; gap: 1rem; }

  .field {
    opacity: 0;
    transform: translateX(-14px);
    animation: fieldIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .field:nth-child(1) { animation-delay: 0.5s; }
  .field:nth-child(2) { animation-delay: 0.6s; }
  .field:nth-child(3) { animation-delay: 0.7s; }
  .field:nth-child(4) { animation-delay: 0.8s; }

  @keyframes fieldIn {
    to { opacity: 1; transform: translateX(0); }
  }

  .emergency-fields .field:nth-child(1) { animation-delay: 0.95s; }

  label {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.42rem;
  }
  .lbl-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .lbl-dot.blue { background: var(--accent-blue); }
  .lbl-dot.green { background: var(--accent-green); }
  .lbl-dot.amber { background: var(--accent-amber); }
  .lbl-dot.red { background: var(--accent-red); }

  /* Input */
  .input-wrap {
    position: relative;
  }
  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--text-muted);
    pointer-events: none;
    transition: color 0.25s ease;
    z-index: 1;
  }
  .input-wrap:focus-within .input-icon { color: var(--accent-blue); }

  input[type="text"] {
    width: 100%;
    padding: 0.78rem 0.95rem 0.78rem 2.65rem;
    font-family: inherit;
    font-size: 0.92rem;
    font-weight: 400;
    color: var(--text);
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    outline: none;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    caret-color: var(--accent-blue);
  }
  input[type="text"]::placeholder { color: var(--text-muted); font-weight: 400; }
  input[type="text"]:focus {
    background: white;
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 3.5px rgba(79,124,255,0.13), var(--shadow-sm);
    transform: translateY(-1px);
  }
  input[type="text"]:valid:not(:placeholder-shown) {
    border-color: rgba(0,196,140,0.5);
    background: white;
  }
  input.emergency-input:focus {
    border-color: var(--accent-red);
    box-shadow: 0 0 0 3.5px rgba(255,77,106,0.12), var(--shadow-sm);
  }
  .input-wrap:focus-within .input-icon.red { color: var(--accent-red); }

  /* Floating label effect */
  .input-wrap input:focus + .input-underline,
  .input-wrap input:valid:not(:placeholder-shown) + .input-underline {
    transform: scaleX(1);
  }
  .input-underline {
    display: none; /* handled by border */
  }

  /* Check indicator */
  .check-icon {
    position: absolute;
    right: 13px;
    top: 50%;
    transform: translateY(-50%) scale(0);
    width: 16px; height: 16px;
    color: var(--accent-green);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }
  input[type="text"]:valid:not(:placeholder-shown) ~ .check-icon {
    transform: translateY(-50%) scale(1);
  }

  /* Emergency section */
  .emergency-section {
    background: rgba(255,77,106,0.04);
    border: 1px solid rgba(255,77,106,0.13);
    border-radius: var(--radius-sm);
    padding: 1.1rem 1.1rem 1rem;
    opacity: 0;
    animation: fieldIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.9s forwards;
  }
  .emergency-section input[type="text"] {
    background: rgba(255,255,255,0.7);
    border-color: rgba(255,77,106,0.18);
  }
  .emergency-section input[type="text"]:focus {
    border-color: var(--accent-red);
    box-shadow: 0 0 0 3.5px rgba(255,77,106,0.12), var(--shadow-sm);
  }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 0.95rem;
    margin-top: 1.4rem;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    color: white;
    background: linear-gradient(135deg, #4f7cff 0%, #00c48c 100%);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(79,124,255,0.3);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    opacity: 0;
    animation: fadeIn 0.5s ease 1.1s forwards;
  }
  .submit-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
    pointer-events: none;
  }
  /* Shimmer on hover */
  .submit-btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -75%;
    width: 50%; height: 200%;
    background: linear-gradient(105deg, transparent, rgba(255,255,255,0.35), transparent);
    transform: skewX(-18deg);
    transition: left 0.55s ease;
  }
  .submit-btn:hover::after { left: 130%; }
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(79,124,255,0.38);
  }
  .submit-btn:active { transform: translateY(0); box-shadow: 0 4px 14px rgba(79,124,255,0.28); }

  .btn-inner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }
  .btn-inner svg { width: 18px; height: 18px; transition: transform 0.3s ease; }
  .submit-btn:hover .btn-inner svg { transform: scale(1.1) rotate(5deg); }

  /* Security note */
  .security-note {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.35rem;
    margin-top: 1rem;
    font-size: 0.76rem;
    color: var(--text-muted);
    opacity: 0;
    animation: fadeIn 0.5s ease 1.2s forwards;
  }
  .security-note svg { width: 12px; height: 12px; }
  .security-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent-green);
    animation: securityPulse 2s ease-in-out infinite;
  }
  @keyframes securityPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Tooltip hints */
  .field-hint {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
    padding-left: 0.2rem;
    display: none;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.01em;
  }
  input:focus ~ .field-hint { display: block; }

  /* Floating particles */
  .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: particleRise linear infinite;
    opacity: 0;
  }
  @keyframes particleRise {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    5% { opacity: 0.7; transform: translateY(95vh) scale(1); }
    90% { opacity: 0.5; }
    100% { transform: translateY(-120px) scale(0.6); opacity: 0; }
  }

  @media (max-width: 520px) {
    .card-body { padding: 1.8rem 1.5rem 1.5rem; }
    .header-text h1 { font-size: 1.3rem; }
    .steps-row { display: none; }
  }
</style>
</head>
<body>

<!-- Background orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Particles -->
<div class="particles" id="particles"></div>

<div class="wrapper">
  <!-- Progress -->
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="card">
    <div class="stripe"></div>
    <div class="card-body">

      <!-- Header -->
      <div class="header">
        <div class="header-top">
          <div class="icon-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1.2"/>
              <rect x="14" y="3" width="7" height="7" rx="1.2"/>
              <rect x="3" y="14" width="7" height="7" rx="1.2"/>
              <path d="M14 14h3v3M17 14v3h3M14 20h3M17 17h3"/>
            </svg>
          </div>
          <div class="header-text">
            <h1>Quick<span class="highlight">Contact</span></h1>
            <p>Register your vehicle for seamless identification</p>
          </div>
        </div>

        <div class="steps-row">
          <div class="step-item">
            <div class="step-num active" id="s1">1</div>
            <span class="step-label active">Vehicle Info</span>
          </div>
          <div class="step-line" id="line1"></div>
          <div class="step-item">
            <div class="step-num" id="s2">2</div>
            <span class="step-label">Contact</span>
          </div>
          <div class="step-line" id="line2"></div>
          <div class="step-item">
            <div class="step-num" id="s3">3</div>
            <span class="step-label">Emergency</span>
          </div>
          <div class="step-line" id="line3"></div>
          <div class="step-item">
            <div class="step-num" id="s4">4</div>
          </div>
        </div>
      </div>

      <form method="POST" action="/register" id="registerForm">

        <div class="form-fields">

          <!-- QR Code -->
          <div class="field">
            <label for="qr">
              <span class="lbl-dot blue"></span>
              QR Code
            </label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
                <path d="M17 14h.01M14 17h.01M17 17h.01M20 14h.01M20 17h.01M20 20h.01M17 20h.01M14 20h.01"/>
              </svg>
              <input type="text" id="qr" name="qr_code" placeholder="Enter or scan QR code ID" required>
              <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg>
            </div>
          </div>

          <!-- Vehicle Number -->
          <div class="field">
            <label for="vehicle">
              <span class="lbl-dot green"></span>
              Vehicle Number
            </label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h5l2 3v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
              </svg>
              <input type="text" id="vehicle" name="vehicle_number" placeholder="e.g. GJ 01 AB 1234" required>
              <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg>
            </div>
          </div>

          <!-- Owner Name -->
          <div class="field">
            <label for="owner">
              <span class="lbl-dot amber"></span>
              Owner Name
            </label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="owner" name="owner_name" placeholder="Full name of vehicle owner" required>
              <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg>
            </div>
          </div>

          <!-- Phone -->
          <div class="field">
            <label for="phone">
              <span class="lbl-dot blue"></span>
              Phone Number
            </label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.58 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.77a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.02z"/>
              </svg>
              <input type="text" id="phone" name="phone" placeholder="+91 98765 43210" required>
              <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg>
            </div>
          </div>

        </div>

        <!-- Divider -->
        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-badge">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L1 21h22L12 2zm1 14h-2v-2h2v2zm0-4h-2V7h2v5z"/></svg>
            Emergency Contact
          </div>
          <div class="divider-line"></div>
        </div>

        <!-- Emergency -->
        <div class="emergency-section">
          <div class="emergency-fields">
            <div class="field">
              <label for="emergency">
                <span class="lbl-dot red"></span>
                Emergency Phone
              </label>
              <div class="input-wrap">
                <svg class="input-icon red" viewBox="0 0 24 24" fill="none" stroke="#ff4d6a" stroke-width="2" stroke-linecap="round">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.58 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.77a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.02z"/>
                </svg>
                <input class="emergency-input" type="text" id="emergency" name="emergency_phone" placeholder="Emergency contact number" required>
                <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg>
              </div>
            </div>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-inner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M9 12l2 2 4-4m6 2a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
            </svg>
            Activate QR Code
          </span>
        </button>

        <div class="security-note">
          <div class="security-dot"></div>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          256-bit encrypted &amp; secure
        </div>

      </form>
    </div>
  </div>
</div>

<script>
  // Particles
  const pContainer = document.getElementById('particles');
  const pColors = ['#4f7cff','#00c48c','#f5a623','#ff4d6a','#c4b5fd','#fda4af'];
  for(let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random() * 10 + 4;
    p.style.cssText = `
      width:${s}px; height:${s}px;
      left:${Math.random()*100}%;
      background:${pColors[Math.floor(Math.random()*pColors.length)]};
      animation-duration:${Math.random()*16+10}s;
      animation-delay:${Math.random()*-20}s;
      opacity:0.5;
    `;
    pContainer.appendChild(p);
  }

  // Progress & step logic
  const inputs = Array.from(document.querySelectorAll('input'));
  const progress = document.getElementById('progressFill');
  const stepEls = [
    document.getElementById('s1'), document.getElementById('s2'),
    document.getElementById('s3'), document.getElementById('s4')
  ];
  const lineEls = [
    document.getElementById('line1'), document.getElementById('line2'),
    document.getElementById('line3')
  ];

  function updateProgress() {
    const filled = inputs.filter(i => i.value.trim().length > 0).length;
    const pct = Math.round((filled / inputs.length) * 100);
    progress.style.width = Math.max(8, pct) + '%';

    // Steps 1=qr+vehicle, 2=owner+phone, 3=emergency, 4=done
    const filledCount = filled;
    const activeStep = filledCount === 0 ? 0 : filledCount <= 2 ? 1 : filledCount <= 4 ? 2 : 3;

    stepEls.forEach((el, idx) => {
      el.classList.remove('active', 'done');
      if(idx < activeStep) { el.classList.add('done'); el.innerHTML = '✓'; }
      else if(idx === activeStep) { el.classList.add('active'); el.innerHTML = idx + 1; }
      else { el.innerHTML = idx + 1; }
    });
    lineEls.forEach((el, idx) => {
      el.classList.toggle('done', idx < activeStep);
    });
  }

  inputs.forEach(input => {
    input.addEventListener('input', updateProgress);
    input.addEventListener('focus', () => {
      input.closest('.input-wrap').style.zIndex = '2';
    });
    input.addEventListener('blur', () => {
      input.closest('.input-wrap').style.zIndex = '';
    });
  });

  // Submit handler
  document.getElementById('registerForm').addEventListener('submit', function(e) {
    const btn = document.getElementById('submitBtn');
    btn.innerHTML = `<span class="btn-inner">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
      Activating...
    </span>`;
    btn.style.background = 'linear-gradient(135deg, #3a6ae0, #00b07e)';
    btn.disabled = true;
    progress.style.width = '100%';
    stepEls.forEach(el => { el.classList.remove('active'); el.classList.add('done'); el.innerHTML = '✓'; });
    lineEls.forEach(el => el.classList.add('done'));
  });
</script>
</body>
</html>

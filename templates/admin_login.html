<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Contact - Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --surface: #ffffff;
    --surface2: #faf8f5;
    --border: #e8e0d8;
    --text: #1a1714;
    --text-secondary: #6b6460;
    --text-muted: #a89f9a;
    --green: #00c48c;
    --blue: #4f7cff;
    --amber: #f5a623;
    --red: #ff4d6a;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
    --shadow-lg: 0 16px 48px rgba(0,0,0,0.1), 0 4px 12px rgba(0,0,0,0.05);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
  }

  /* Background gradient layers */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 700px 500px at 10% 10%, rgba(79,124,255,0.08) 0%, transparent 65%),
      radial-gradient(ellipse 600px 500px at 90% 85%, rgba(0,196,140,0.08) 0%, transparent 65%),
      radial-gradient(ellipse 400px 300px at 55% 45%, rgba(245,166,35,0.06) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.055) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none; z-index: 0;
    animation: dotShift 20s linear infinite;
  }
  @keyframes dotShift {
    0% { background-position: 0 0; }
    100% { background-position: 28px 28px; }
  }

  /* Orbs */
  .orb {
    position: fixed; border-radius: 50%;
    filter: blur(72px); pointer-events: none; z-index: 0;
    animation: orbFloat ease-in-out infinite;
  }
  .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(79,124,255,0.16), transparent 70%); top: -150px; left: -130px; animation-duration: 13s; }
  .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,196,140,0.14), transparent 70%); bottom: -100px; right: -100px; animation-duration: 11s; animation-delay: -4s; }
  .orb-3 { width: 280px; height: 280px; background: radial-gradient(circle, rgba(245,166,35,0.11), transparent 70%); top: 40%; left: 58%; animation-duration: 9s; animation-delay: -6s; }
  .orb-4 { width: 200px; height: 200px; background: radial-gradient(circle, rgba(255,77,106,0.09), transparent 70%); top: 20%; right: 5%; animation-duration: 15s; animation-delay: -2s; }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0,0) scale(1); }
    33%  { transform: translate(28px,-28px) scale(1.06); }
    66%  { transform: translate(-20px,20px) scale(0.95); }
  }

  /* Floating particles */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
  .particle {
    position: absolute; border-radius: 50%; opacity: 0;
    animation: particleRise linear infinite;
  }
  @keyframes particleRise {
    0%   { transform: translateY(100vh) scale(0) rotate(0deg); opacity: 0; }
    5%   { opacity: 0.6; transform: translateY(95vh) scale(1) rotate(45deg); }
    90%  { opacity: 0.35; }
    100% { transform: translateY(-10vh) scale(0.5) rotate(360deg); opacity: 0; }
  }

  /* Wrapper */
  .wrapper {
    position: relative; z-index: 10;
    width: 100%; max-width: 420px;
  }

  /* Brand above card */
  .brand {
    text-align: center;
    margin-bottom: 1.4rem;
    opacity: 0;
    animation: fadeSlideDown 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards;
  }
  .brand-logo {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
  }
  .brand-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #4f7cff, #00c48c);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 22px rgba(79,124,255,0.35);
    position: relative; overflow: hidden;
    animation: iconPulse 3s ease-in-out infinite;
  }
  @keyframes iconPulse {
    0%, 100% { box-shadow: 0 6px 22px rgba(79,124,255,0.35); }
    50% { box-shadow: 0 6px 32px rgba(79,124,255,0.55), 0 0 0 6px rgba(79,124,255,0.08); }
  }
  .brand-icon::before {
    content: '';
    position: absolute; inset: 0;
    background: conic-gradient(from 0deg, transparent 55%, rgba(255,255,255,0.3) 65%, transparent 75%);
    animation: sweepRotate 3s linear infinite;
  }
  @keyframes sweepRotate { to { transform: rotate(360deg); } }
  .brand-icon svg { width: 20px; height: 20px; color: white; position: relative; z-index: 1; }
  .brand-name {
    font-family: 'DM Mono', monospace;
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.04em;
  }
  .brand-name span {
    background: linear-gradient(135deg, #4f7cff, #00c48c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-16px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { to { opacity: 1; } }

  /* Card */
  .card {
    background: var(--surface);
    border-radius: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    opacity: 0;
    transform: translateY(32px) scale(0.96);
    animation: cardReveal 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.25s forwards;
    transition: box-shadow 0.4s ease;
  }
  .card:hover {
    box-shadow: 0 24px 64px rgba(0,0,0,0.13), 0 6px 16px rgba(0,0,0,0.06);
  }
  @keyframes cardReveal {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Animated rainbow stripe */
  .stripe {
    height: 3px;
    background: linear-gradient(90deg, #4f7cff 0%, #00c48c 30%, #f5a623 60%, #ff4d6a 80%, #4f7cff 100%);
    background-size: 300% 100%;
    animation: stripeMove 4s linear infinite;
  }
  @keyframes stripeMove {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }

  /* Hero section */
  .hero {
    background: linear-gradient(160deg, #f0f4ff 0%, #e8fdf5 60%, #fdf8f0 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.8rem 2.2rem 1.5rem;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.6s forwards;
  }

  /* Animated hero pattern */
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(79,124,255,0.07) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
    animation: patternDrift 12s linear infinite;
  }
  @keyframes patternDrift {
    0% { background-position: 0 0; }
    100% { background-position: 20px 20px; }
  }

  /* Hero shimmer sweep */
  .hero::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(105deg, transparent, rgba(255,255,255,0.5), transparent);
    animation: heroShimmer 5s ease 1.2s infinite;
  }
  @keyframes heroShimmer {
    0% { left: -100%; }
    40%, 100% { left: 150%; }
  }

  .admin-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.28rem 0.8rem;
    background: rgba(79,124,255,0.1);
    border: 1px solid rgba(79,124,255,0.22);
    border-radius: 99px;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.9rem;
    position: relative; z-index: 1;
  }
  .admin-badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blue);
    animation: blink 1.6s ease-in-out infinite;
    box-shadow: 0 0 6px rgba(79,124,255,0.6);
  }
  @keyframes blink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.25; transform: scale(0.8); }
  }

  /* Lock icon with unlock animation */
  .lock-wrap {
    position: absolute;
    top: 1.4rem; right: 1.8rem;
    z-index: 2;
    opacity: 0;
    animation: fadeIn 0.4s ease 0.9s forwards;
  }
  .lock-icon {
    width: 44px; height: 44px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
    cursor: default;
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .lock-icon.unlocked {
    background: linear-gradient(135deg, rgba(0,196,140,0.12), rgba(79,124,255,0.08));
    border-color: rgba(0,196,140,0.35);
    box-shadow: 0 4px 16px rgba(0,196,140,0.2);
  }
  .lock-icon::before {
    content: '';
    position: absolute; inset: 0;
    background: conic-gradient(from 180deg, transparent 70%, rgba(79,124,255,0.15) 85%, transparent 95%);
    animation: lockGlow 3s linear infinite;
  }
  @keyframes lockGlow { to { transform: rotate(360deg); } }
  .lock-icon svg { width: 20px; height: 20px; position: relative; z-index: 1; transition: color 0.4s ease; }
  .lock-icon .lock-locked { color: var(--text-muted); }
  .lock-icon .lock-open { color: var(--green); display: none; }
  .lock-icon.unlocked .lock-locked { display: none; }
  .lock-icon.unlocked .lock-open { display: block; }

  .hero-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.03em;
    line-height: 1.2;
    position: relative; z-index: 1;
  }
  .hero-title .accent {
    color: var(--blue);
    position: relative;
    display: inline-block;
  }
  /* Underline animate */
  .hero-title .accent::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0;
    width: 0; height: 2px;
    background: linear-gradient(90deg, var(--blue), var(--green));
    border-radius: 2px;
    animation: underlineDraw 0.8s ease 1.4s forwards;
  }
  @keyframes underlineDraw { to { width: 100%; } }

  .hero-sub {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 0.4rem;
    position: relative; z-index: 1;
    overflow: hidden;
    white-space: nowrap;
    width: 0;
    animation: typewriter 0.9s steps(38, end) 1.1s forwards;
  }
  @keyframes typewriter { to { width: 100%; } }

  /* Card body */
  .card-body { padding: 1.8rem 2.2rem 2rem; }

  /* Form groups */
  .form-group {
    margin-bottom: 1.2rem;
    opacity: 0;
    animation: fadeSlideUp 0.55s cubic-bezier(0.34,1.2,0.64,1) forwards;
  }
  .form-group:nth-child(1) { animation-delay: 0.8s; }
  .form-group:nth-child(2) { animation-delay: 0.95s; }

  .form-label {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.74rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    transition: color 0.25s ease;
  }
  .form-label svg { width: 11px; height: 11px; }
  .input-wrap:focus-within ~ * .form-label,
  .form-group:focus-within .form-label { color: var(--blue); }

  .input-wrap { position: relative; }

  .input-icon {
    position: absolute;
    left: 0.95rem; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    transition: color 0.25s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .input-icon svg { width: 16px; height: 16px; }
  .input-wrap:focus-within .input-icon {
    color: var(--blue);
    transform: translateY(-50%) scale(1.15);
  }

  .form-input {
    width: 100%;
    padding: 0.85rem 1rem 0.85rem 2.65rem;
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--text);
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    outline: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  .form-input::placeholder { color: var(--text-muted); font-weight: 400; }
  .form-input:focus {
    border-color: var(--blue);
    background: white;
    box-shadow: 0 0 0 4px rgba(79,124,255,0.1), var(--shadow-sm);
    transform: translateY(-1px);
  }

  /* Input shimmer on focus */
  .input-shimmer {
    position: absolute;
    inset: 0; border-radius: 12px;
    pointer-events: none;
    overflow: hidden;
  }
  .input-shimmer::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(105deg, transparent, rgba(79,124,255,0.06), transparent);
    transition: none;
  }
  .form-input:focus ~ .input-shimmer::after {
    animation: inputShimmer 0.6s ease forwards;
  }
  @keyframes inputShimmer {
    0% { left: -100%; }
    100% { left: 150%; }
  }

  /* Password toggle */
  .pw-toggle {
    position: absolute;
    right: 0.95rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 0.25rem;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    transition: color 0.2s ease, background 0.2s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .pw-toggle:hover { color: var(--blue); background: rgba(79,124,255,0.08); transform: translateY(-50%) scale(1.15); }
  .pw-toggle svg { width: 16px; height: 16px; }

  /* Strength bar */
  .strength-bar {
    display: flex;
    gap: 4px;
    margin-top: 0.5rem;
    height: 3px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .strength-bar.visible { opacity: 1; }
  .strength-seg {
    flex: 1; border-radius: 2px;
    background: var(--border);
    transition: background 0.4s ease, transform 0.3s ease;
    transform-origin: left;
    transform: scaleX(0);
  }
  .strength-seg.active { transform: scaleX(1); }
  .strength-seg.weak { background: var(--red); }
  .strength-seg.medium { background: var(--amber); }
  .strength-seg.strong { background: var(--green); }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.4rem 0;
    opacity: 0;
    animation: fadeIn 0.4s ease 1.1s forwards;
    position: relative;
    overflow: hidden;
  }
  .divider::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(79,124,255,0.3), transparent);
    animation: dividerSweep 2s ease 1.5s forwards;
  }
  @keyframes dividerSweep {
    0% { left: -100%; }
    100% { left: 100%; }
  }

  /* Submit button */
  .submit-wrap {
    opacity: 0;
    animation: fadeSlideUp 0.55s cubic-bezier(0.34,1.2,0.64,1) 1.15s forwards;
  }

  .btn-submit {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    width: 100%;
    padding: 1rem 1.2rem;
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: white;
    background: linear-gradient(135deg, #4f7cff 0%, #3a6bff 40%, #00c48c 100%);
    background-size: 200% 100%;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(79,124,255,0.32);
    position: relative;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    letter-spacing: 0.01em;
    animation: btnGradientShift 4s ease infinite;
  }
  @keyframes btnGradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .btn-submit::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
    transform: translateX(-100%) skewX(-15deg);
    transition: none;
  }
  .btn-submit:hover::before {
    animation: btnShine 0.6s ease forwards;
  }
  @keyframes btnShine {
    to { transform: translateX(200%) skewX(-15deg); }
  }
  .btn-submit:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 32px rgba(79,124,255,0.42);
  }
  .btn-submit:active { transform: translateY(-1px); }

  /* Loading state */
  .btn-submit.loading {
    pointer-events: none;
    background: linear-gradient(135deg, #6b94ff, #33d4a6);
  }
  .btn-submit.loading .btn-label { opacity: 0; }
  .btn-submit.loading .btn-spinner { display: flex; }

  .btn-label { position: relative; z-index: 1; display: flex; align-items: center; gap: 0.5rem; transition: opacity 0.2s ease; }
  .btn-label svg { width: 18px; height: 18px; }

  .btn-spinner {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    gap: 0.5rem;
    z-index: 1;
  }
  .spinner-ring {
    width: 20px; height: 20px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-text { font-size: 0.88rem; font-weight: 600; color: white; }

  /* Success burst overlay */
  .success-overlay {
    position: fixed; inset: 0;
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    opacity: 0;
  }
  .success-overlay.show { pointer-events: all; }
  .success-burst {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--green), #00e5a0);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transform: scale(0);
    box-shadow: 0 0 0 0 rgba(0,196,140,0.4);
  }
  .success-burst svg { width: 36px; height: 36px; color: white; opacity: 0; }
  .success-overlay.animate .success-burst {
    animation: burstScale 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  .success-overlay.animate .success-burst svg {
    animation: checkFade 0.3s ease 0.4s forwards;
  }
  @keyframes burstScale {
    0% { transform: scale(0); box-shadow: 0 0 0 0 rgba(0,196,140,0.5); }
    60% { box-shadow: 0 0 0 40px rgba(0,196,140,0); }
    100% { transform: scale(1); box-shadow: 0 0 0 60px rgba(0,196,140,0); }
  }
  @keyframes checkFade { to { opacity: 1; } }

  /* Footer */
  .card-footer {
    padding: 1rem 2.2rem 1.4rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.3s forwards;
  }
  .footer-info {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.73rem; color: var(--text-muted);
  }
  .footer-info svg { width: 12px; height: 12px; }
  .footer-powered { font-size: 0.68rem; color: var(--text-muted); opacity: 0.7; }
  .footer-powered span {
    font-weight: 600;
    background: linear-gradient(135deg, #4f7cff, #00c48c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Error state */
  .form-input.error {
    border-color: var(--red);
    box-shadow: 0 0 0 4px rgba(255,77,106,0.1);
    animation: shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97) both;
  }
  @keyframes shake {
    10%, 90% { transform: translateX(-2px); }
    20%, 80% { transform: translateX(4px); }
    30%, 50%, 70% { transform: translateX(-5px); }
    40%, 60% { transform: translateX(5px); }
  }
  .error-msg {
    font-size: 0.73rem; color: var(--red);
    margin-top: 0.4rem;
    display: none; align-items: center; gap: 0.3rem;
    animation: slideInMsg 0.3s ease forwards;
  }
  .error-msg.show { display: flex; }
  @keyframes slideInMsg {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .error-msg svg { width: 11px; height: 11px; flex-shrink: 0; }

  @media (max-width: 480px) {
    .hero, .card-body { padding-left: 1.5rem; padding-right: 1.5rem; }
    .card-footer { padding-left: 1.5rem; padding-right: 1.5rem; }
    .hero-title { font-size: 1.25rem; }
    .hero-sub { animation: none; width: auto; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>
<div class="particles" id="particles"></div>

<!-- Success Overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-burst" id="successBurst">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 13l4 4L19 7"/>
    </svg>
  </div>
</div>

<div class="wrapper">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3m0 4h4v-4m-4 0v-3"/>
        </svg>
      </div>
      <div class="brand-name">Quick<span>Contact</span></div>
    </div>
  </div>

  <div class="card">
    <div class="stripe"></div>

    <!-- Hero -->
    <div class="hero">
      <!-- Animated lock icon -->
      <div class="lock-wrap">
        <div class="lock-icon" id="lockIcon">
          <svg class="lock-locked" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <svg class="lock-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
          </svg>
        </div>
      </div>

      <div class="admin-badge">
        <span class="admin-badge-dot"></span>
        Admin Portal
      </div>
      <div class="hero-title">Welcome <span class="accent">Back</span></div>
      <div class="hero-sub">Sign in to manage your QR vehicle registry</div>
    </div>

    <!-- Body -->
    <div class="card-body">
      <form method="POST" id="loginForm" novalidate>

        <!-- Username -->
        <div class="form-group">
          <label class="form-label" for="username">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Username
          </label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" name="username" id="username" class="form-input" placeholder="Enter your username" autocomplete="username" required>
            <div class="input-shimmer"></div>
          </div>
          <div class="error-msg" id="usernameError">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L1 21h22L12 2zm1 14h-2v-2h2v2zm0-4h-2V7h2v5z"/></svg>
            Please enter your username
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Password
          </label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" name="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" style="padding-right:2.8rem;" required>
            <div class="input-shimmer"></div>
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
              <svg id="eyeShow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eyeHide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <!-- Strength bar -->
          <div class="strength-bar" id="strengthBar">
            <div class="strength-seg" id="seg1"></div>
            <div class="strength-seg" id="seg2"></div>
            <div class="strength-seg" id="seg3"></div>
            <div class="strength-seg" id="seg4"></div>
          </div>
          <div class="error-msg" id="passwordError">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L1 21h22L12 2zm1 14h-2v-2h2v2zm0-4h-2V7h2v5z"/></svg>
            Please enter your password
          </div>
        </div>

        <div class="divider"></div>

        <!-- Submit -->
        <div class="submit-wrap">
          <button type="submit" class="btn-submit" id="btnSubmit">
            <span class="btn-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Sign In to Admin
            </span>
            <span class="btn-spinner">
              <span class="spinner-ring"></span>
              <span class="spinner-text">Signing in…</span>
            </span>
          </button>
        </div>

      </form>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      <div class="footer-info">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Secure admin access
      </div>
      <div class="footer-powered">Powered by <span>QRVault</span></div>
    </div>

  </div>
</div>

<script>
  /* ── Floating particles ── */
  const pWrap = document.getElementById('particles');
  const pColors = ['#4f7cff','#00c48c','#f5a623','#ff4d6a','#c4b5fd','#6ee7b7'];
  const pShapes = ['50%', '3px', '2px'];
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random() * 9 + 3;
    p.style.cssText = `
      width:${s}px; height:${s}px;
      left:${Math.random()*100}%;
      background:${pColors[Math.floor(Math.random()*pColors.length)]};
      border-radius:${pShapes[Math.floor(Math.random()*pShapes.length)]};
      animation-duration:${Math.random()*16+10}s;
      animation-delay:${Math.random()*-20}s;
      opacity:0;
    `;
    pWrap.appendChild(p);
  }

  /* ── Password toggle ── */
  const pwToggle = document.getElementById('pwToggle');
  const pwInput  = document.getElementById('password');
  const eyeShow  = document.getElementById('eyeShow');
  const eyeHide  = document.getElementById('eyeHide');
  pwToggle.addEventListener('click', () => {
    const isPass = pwInput.type === 'password';
    pwInput.type = isPass ? 'text' : 'password';
    eyeShow.style.display = isPass ? 'none' : '';
    eyeHide.style.display = isPass ? '' : 'none';
  });

  /* ── Password strength ── */
  const strengthBar = document.getElementById('strengthBar');
  const segs = [document.getElementById('seg1'), document.getElementById('seg2'),
                document.getElementById('seg3'), document.getElementById('seg4')];
  pwInput.addEventListener('input', () => {
    const v = pwInput.value;
    let score = 0;
    if (v.length >= 6) score++;
    if (v.length >= 10) score++;
    if (/[A-Z]/.test(v) && /[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;

    strengthBar.classList.toggle('visible', v.length > 0);
    const cls = score <= 1 ? 'weak' : score === 2 ? 'medium' : 'strong';
    segs.forEach((s, i) => {
      s.className = 'strength-seg';
      if (i < score) {
        setTimeout(() => { s.classList.add('active', cls); }, i * 80);
      }
    });

    // Unlock lock icon when password has content
    const lock = document.getElementById('lockIcon');
    if (v.length > 0) lock.classList.add('unlocked');
    else lock.classList.remove('unlocked');
  });

  /* ── Lock unlock on username focus ── */
  document.getElementById('username').addEventListener('focus', () => {
    document.getElementById('lockIcon').classList.add('unlocked');
  });
  document.getElementById('username').addEventListener('blur', function() {
    if (!pwInput.value) document.getElementById('lockIcon').classList.remove('unlocked');
  });

  /* ── Form validation & submit ── */
  const form = document.getElementById('loginForm');
  const btn  = document.getElementById('btnSubmit');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    let valid = true;

    const uEl = document.getElementById('username');
    const uErr = document.getElementById('usernameError');
    if (!uEl.value.trim()) {
      uEl.classList.add('error');
      uErr.classList.add('show');
      valid = false;
    } else {
      uEl.classList.remove('error');
      uErr.classList.remove('show');
    }

    const pEl = document.getElementById('password');
    const pErr = document.getElementById('passwordError');
    if (!pEl.value.trim()) {
      pEl.classList.add('error');
      pErr.classList.add('show');
      valid = false;
    } else {
      pEl.classList.remove('error');
      pErr.classList.remove('show');
    }

    if (!valid) return;

    // Loading state
    btn.classList.add('loading');

    // Simulate — in real use, this would be actual form submit
    setTimeout(() => {
      btn.classList.remove('loading');
      // Success burst
      const overlay = document.getElementById('successOverlay');
      overlay.classList.add('show');
      requestAnimationFrame(() => overlay.classList.add('animate'));
      // Actually submit after burst
      setTimeout(() => form.submit(), 800);
    }, 1600);
  });

  /* ── Clear errors on input ── */
  ['username', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      this.classList.remove('error');
      document.getElementById(id + 'Error').classList.remove('show');
    });
  });

  /* ── Ripple on button ── */
  btn.addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const rip  = document.createElement('span');
    const size = Math.max(rect.width, rect.height) * 2.2;
    rip.style.cssText = `
      position:absolute; border-radius:50%;
      width:${size}px; height:${size}px;
      left:${e.clientX - rect.left - size/2}px;
      top:${e.clientY - rect.top - size/2}px;
      background:rgba(255,255,255,0.22);
      transform:scale(0); pointer-events:none;
      animation: rpl 0.55s ease-out forwards;
    `;
    this.appendChild(rip);
    setTimeout(() => rip.remove(), 600);
  });

  const s = document.createElement('style');
  s.textContent = `@keyframes rpl { to { transform:scale(1); opacity:0; } }`;
  document.head.appendChild(s);
</script>
</body>
</html>
